<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pedido Confirmado</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(15px);}
          to { opacity: 1; transform: translateY(0);}
        }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }
    </style>
</head>

<body class="bg-gray-100">

<div class="max-w-4xl mx-auto mt-10 animate-fadeIn">

    <!-- ✅ CONFIRMAÇÃO -->
    <div class="bg-white p-6 rounded-xl shadow mb-6 border-l-4 border-green-500">
        <h1 class="text-2xl font-bold text-green-600 mb-2">
            Pedido realizado com sucesso!
        </h1>

        <p class="text-gray-600">
            Obrigado pela sua compra 🙌
        </p>

        <p id="numeroPedido" class="mt-3 font-semibold"></p>
    </div>

    <!-- 📦 STATUS -->
    <div class="bg-white p-6 rounded-xl shadow mb-6">
        <h2 class="text-lg font-semibold mb-2">Status do pedido</h2>

        <span id="statusPedido"
              class="px-3 py-1 rounded-full text-sm font-semibold">
    </span>
    </div>

    <!-- 📚 ITENS -->
    <div class="bg-white p-6 rounded-xl shadow mb-6">
        <h2 class="text-lg font-semibold mb-4">Itens do pedido</h2>

        <div id="listaItens" class="space-y-3"></div>
    </div>

    <!-- 💰 RESUMO -->
    <div class="bg-white p-6 rounded-xl shadow mb-6">
        <h2 class="text-lg font-semibold mb-4">Resumo</h2>

        <div class="flex justify-between">
            <span>Total:</span>
            <span id="totalPedido" class="font-bold"></span>
        </div>
    </div>

    <!-- 🚀 AÇÕES -->
    <div class="flex gap-4">
        <button onclick="voltar()"
                class="flex-1 bg-gray-200 py-3 rounded-lg hover:bg-gray-300 transition">
            Voltar à loja
        </button>

        <button onclick="acompanhar()"
                class="flex-1 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition">
            Acompanhar pedido
        </button>
    </div>

</div>

<script src="/js/meuspedidos.js"></script>
